<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#0f1115;
    --panel:#161922;
    --panel2:#1c2030;
    --panel3:#21263a;
    --line:#272c3a;
    --text:#e9ebf2;
    --muted:#8b91a7;
    --accent-a:#7c9eff;
    --accent-b:#ff9d6c;
    --done:#5fd4a0;
    --doing:#f3c969;
    --todo:#7e85a3;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:28px 20px 60px;
  }
  h1{font-size:21px; font-weight:700; margin:0 0 4px;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .top-bar{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
  .actions{display:flex; gap:8px;}
  .btn{
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
    font-size:12.5px;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
  }
  .btn:hover{border-color:#3a4160;}
  .btn.primary{background:linear-gradient(135deg,var(--accent-a),#5b7fe0); border:none; color:#0b0d12;}
  .btn.ghost{background:none; color:var(--muted);}
  .btn.danger{background:none; border-color:#4a2a2a; color:var(--danger);}
  .btn.danger:hover{background:rgba(255,107,107,0.08);}

  .legend{display:flex; gap:16px; margin-bottom:18px; font-size:12px; color:var(--muted); flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:6px;}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block;}

  .filters{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .chip{
    font-size:11.5px;
    padding:5px 11px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--muted);
    cursor:pointer;
    background:var(--panel2);
  }
  .chip.active{color:var(--text); border-color:#3a4160; background:var(--panel3);}

  .board{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
  @media (max-width:760px){.board{grid-template-columns:1fr;}}
  .col{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; min-height:200px; display:flex; flex-direction:column;}
  .col-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:0 2px;}
  .col-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; display:flex; align-items:center; gap:8px;}
  .count{font-size:11px; color:var(--muted); background:var(--panel2); padding:2px 8px; border-radius:20px;}
  .dropzone{flex:1; min-height:120px; border-radius:8px; transition:background .15s ease; padding:2px;}
  .dropzone.over{background:rgba(124,158,255,0.07); outline:1.5px dashed #3a4160;}

  .card{
    background:var(--panel2);
    border:1px solid var(--line);
    border-left:3px solid var(--todo);
    border-radius:9px;
    padding:10px 12px;
    margin-bottom:10px;
    cursor:pointer;
    font-size:13px;
    line-height:1.45;
    user-select:none;
  }
  .card:hover{border-color:#3a4160;}
  .card.dragging{opacity:0.35;}
  .card[draggable="true"]{cursor:grab;}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:5px;}
  .tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap; letter-spacing:0.3px;}
  .tag.gameplay{background:rgba(124,158,255,0.15); color:var(--accent-a);}
  .tag.network{background:rgba(255,157,108,0.15); color:var(--accent-b);}
  .tag.both{background:rgba(255,255,255,0.1); color:#cfd3e0;}
  .week{font-size:10.5px; color:var(--muted); font-weight:600;}
  .title{font-weight:600; margin-bottom:2px;}
  .desc{color:var(--muted); font-size:12px;}
  .card-bottom{display:flex; justify-content:space-between; align-items:center; margin-top:8px;}
  .assignee{
    font-size:10.5px;
    color:var(--text);
    background:var(--panel3);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:20px;
  }
  .note-flag{font-size:10.5px; color:var(--muted);}

  .progress-wrap{margin-top:18px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .progress-row{display:flex; align-items:center; gap:12px; font-size:12px; color:var(--muted);}
  .bar-bg{flex:1; height:7px; background:var(--panel2); border-radius:20px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--accent-a),var(--done)); width:0%; transition:width .3s ease;}

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(5,6,10,0.6);
    display:none; align-items:center; justify-content:center;
    z-index:50; padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:100%; max-width:480px; padding:22px;
    max-height:88vh; overflow-y:auto;
  }
  .modal h2{font-size:16px; margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11.5px; color:var(--muted); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;}
  .field input[type=text], .field textarea, .field select{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:9px 10px;
    font-size:13px;
    font-family:inherit;
  }
  .field textarea{resize:vertical; min-height:70px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex; justify-content:space-between; align-items:center; margin-top:18px; gap:8px;}
  .modal-actions .left{display:flex; gap:8px;}
  .close-x{position:absolute; top:14px; right:18px; cursor:pointer; color:var(--muted); font-size:18px; background:none; border:none;}
  .modal-wrap{position:relative;}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Tháng 1 — Học & triển khai dự án (coop multiplayer)</h1>
    <div class="sub">Bấm vào thẻ để xem/sửa chi tiết · kéo thẻ để đổi trạng thái</div>
  </div>
  <div class="actions">
    <button class="btn" id="manage-people-btn">👤 Người phụ trách</button>
    <button class="btn primary" id="add-task-btn">+ Thêm task</button>
    <button class="btn ghost" onclick="resetBoard()">↺ Reset mặc định</button>
  </div>
</div>

<div class="legend">
  <span><span class="dot" style="background:var(--accent-a)"></span>Gameplay</span>
  <span><span class="dot" style="background:var(--accent-b)"></span>Network</span>
  <span><span class="dot" style="background:#cfd3e0"></span>Cả hai</span>
</div>

<div class="filters" id="filters"></div>

<div class="board">
  <div class="col" data-status="todo">
    <div class="col-head"><div class="col-title"><span class="dot" style="background:var(--todo)"></span>Chưa làm</div><div class="count" id="count-todo">0</div></div>
    <div class="dropzone" id="zone-todo"></div>
  </div>
  <div class="col" data-status="doing">
    <div class="col-head"><div class="col-title"><span class="dot" style="background:var(--doing)"></span>Đang làm</div><div class="count" id="count-doing">0</div></div>
    <div class="dropzone" id="zone-doing"></div>
  </div>
  <div class="col" data-status="done">
    <div class="col-head"><div class="col-title"><span class="dot" style="background:var(--done)"></span>Done</div><div class="count" id="count-done">0</div></div>
    <div class="dropzone" id="zone-done"></div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-row">
    <span id="progress-label">0 / 0 task hoàn thành</span>
    <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
    <span id="progress-pct">0%</span>
  </div>
</div>

<!-- Task modal -->
<div class="overlay" id="task-overlay">
  <div class="modal modal-wrap">
    <button class="close-x" id="close-modal">✕</button>
    <h2 id="modal-title">Chi tiết task</h2>
    <input type="hidden" id="task-id">

    <div class="field">
      <label>Tiêu đề</label>
      <input type="text" id="f-title" placeholder="Tên task">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Phụ trách</label>
        <select id="f-role">
          <option value="gameplay">Gameplay</option>
          <option value="network">Network</option>
          <option value="both">Cả hai</option>
        </select>
      </div>
      <div class="field">
        <label>Người gán</label>
        <select id="f-assignee"></select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Tuần</label>
        <select id="f-week">
          <option>Tuần 1</option>
          <option>Tuần 2</option>
          <option>Tuần 3</option>
          <option>Tuần 4</option>
        </select>
      </div>
      <div class="field">
        <label>Trạng thái</label>
        <select id="f-status">
          <option value="todo">Chưa làm</option>
          <option value="doing">Đang làm</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Mô tả ngắn</label>
      <textarea id="f-desc" placeholder="Mô tả ngắn gọn hiển thị trên thẻ"></textarea>
    </div>

    <div class="field">
      <label>Ghi chú chi tiết</label>
      <textarea id="f-note" placeholder="Ghi chú, link tài liệu, lưu ý kỹ thuật, kết quả mong muốn..." style="min-height:110px;"></textarea>
    </div>

    <div class="modal-actions">
      <div class="left">
        <button class="btn danger" id="delete-task-btn">Xóa task</button>
      </div>
      <div class="left">
        <button class="btn ghost" id="cancel-modal-btn">Hủy</button>
        <button class="btn primary" id="save-task-btn">Lưu</button>
      </div>
    </div>
  </div>
</div>

<!-- People modal -->
<div class="overlay" id="people-overlay">
  <div class="modal modal-wrap" style="max-width:380px;">
    <button class="close-x" id="close-people-modal">✕</button>
    <h2>Người phụ trách</h2>
    <div class="field">
      <label>Tên người 1</label>
      <input type="text" id="person1-input">
    </div>
    <div class="field">
      <label>Tên người 2</label>
      <input type="text" id="person2-input">
    </div>
    <div class="modal-actions">
      <div></div>
      <div class="left">
        <button class="btn ghost" id="cancel-people-btn">Hủy</button>
        <button class="btn primary" id="save-people-btn">Lưu</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'thang1-kanban-state-v2';
const PEOPLE_KEY = 'thang1-kanban-people';

const defaultPeople = { p1: 'Người 1', p2: 'Người 2' };

const defaultTasks = [
  {id:'t1', role:'both', week:'Tuần 1', title:'Chốt vai trò: Gameplay lead vs Network lead', desc:'Thống nhất ai chính mảng nào, ai phụ.', note:'Quyết định dựa trên thế mạnh sẵn có: ai quen code logic/gameplay hơn thì làm Gameplay, ai quen hệ thống/debug sâu hơn thì làm Network.', status:'todo', assignee:''},
  {id:'t2', role:'both', week:'Tuần 1', title:'Tạo GitHub repo chung + quy tắc branch', desc:'main + feature branch, không cần phức tạp.', note:'Đặt .gitignore chuẩn cho Unity ngay từ đầu để tránh commit nhầm file build/Library.', status:'todo', assignee:''},
  {id:'t3', role:'both', week:'Tuần 1', title:'Cài Unity, tạo project rỗng', desc:'Đặt cấu trúc thư mục Assets/_Project.', note:'Dùng đúng cấu trúc thư mục đã thống nhất: Scripts/Core, Networking, Player, Combat, Crafting, Enemy, World, UI.', status:'todo', assignee:''},
  {id:'t4', role:'gameplay', week:'Tuần 1', title:'Học C# cơ bản: class, struct, list, dictionary', desc:'Qua tutorial chính thức Unity Learn.', note:'Ưu tiên học qua làm, không học lý thuyết suông. Mỗi khái niệm thử viết 1 đoạn code nhỏ minh họa.', status:'todo', assignee:''},
  {id:'t5', role:'network', week:'Tuần 1', title:'Học C# nâng cao: async/await, delegate, event', desc:'Cần thiết cho networking code sau này.', note:'Netcode dùng rất nhiều callback/event — nắm chắc phần này sẽ đỡ rối khi đọc code mẫu.', status:'todo', assignee:''},
  {id:'t6', role:'network', week:'Tuần 1', title:'Đọc tổng quan Netcode for GameObjects docs', desc:'Hiểu khái niệm Server/Client/Host, RPC.', note:'Tập trung hiểu sự khác nhau giữa ServerRpc và ClientRpc, và khái niệm NetworkVariable.', status:'todo', assignee:''},

  {id:'t7', role:'gameplay', week:'Tuần 2', title:'Làm PlayerController di chuyển top-down', desc:'WASD/Joystick, chưa multiplayer.', note:'Giữ code di chuyển đơn giản, tách riêng phần Input để dễ gắn network sau.', status:'todo', assignee:''},
  {id:'t8', role:'gameplay', week:'Tuần 2', title:'Làm hệ thống bắn 1 loại đạn cơ bản', desc:'Spawn projectile, bay thẳng, va chạm.', note:'Dùng object pooling ngay từ đầu nếu có thể, vì sau này cần cho phần network sync.', status:'todo', assignee:''},
  {id:'t9', role:'network', week:'Tuần 2', title:'Làm theo tutorial "Hello World" của NGO', desc:'Code từng dòng, hiểu ServerRpc/ClientRpc.', note:'Link: tài liệu chính thức Unity Netcode for GameObjects — phần Hello World Sample.', status:'todo', assignee:''},
  {id:'t10', role:'network', week:'Tuần 2', title:'Tìm hiểu Unity Relay + lấy join code', desc:'Đọc docs, thử demo mẫu của Unity.', note:'Test thử tạo phòng và lấy join code, chưa cần kết nối gameplay thật.', status:'todo', assignee:''},

  {id:'t11', role:'gameplay', week:'Tuần 3', title:'Thêm 1 quái vật cơ bản (di chuyển + máu)', desc:'AI đơn giản: đuổi theo player.', note:'Chưa cần AI thông minh, chỉ cần đuổi theo + có HP để test combat loop.', status:'todo', assignee:''},
  {id:'t12', role:'gameplay', week:'Tuần 3', title:'Thêm va chạm đạn-quái, trừ máu, quái chết', desc:'Hoàn thiện 1 vòng combat tối giản.', note:'Đây là vòng combat local sẽ ghép vào network ở tuần 4 — giữ code rõ ràng, dễ tách phần "tính toán kết quả" ra để Host xử lý sau.', status:'todo', assignee:''},
  {id:'t13', role:'network', week:'Tuần 3', title:'Dựng scene Lobby: nút Tạo phòng / Nhập mã', desc:'UI tối giản, chưa cần đẹp.', note:'Chỉ cần 2 nút và 1 ô nhập mã, function thật quan trọng hơn giao diện ở bước này.', status:'todo', assignee:''},
  {id:'t14', role:'network', week:'Tuần 3', title:'Test 2 máy thật kết nối qua Relay', desc:'Không qua localhost — test mạng thật.', note:'Test với 2 mạng khác nhau (ví dụ wifi nhà và 4G) để chắc chắn NAT traversal hoạt động.', status:'todo', assignee:''},
  {id:'t15', role:'network', week:'Tuần 3', title:'Đồng bộ vị trí player qua mạng', desc:'2 client thấy nhau di chuyển đúng.', note:'Dùng NetworkTransform hoặc tự viết NetworkVariable cho position — so sánh độ mượt giữa 2 cách.', status:'todo', assignee:''},

  {id:'t16', role:'both', week:'Tuần 4', title:'Ghép PlayerController vào hệ thống network', desc:'Input local, di chuyển sync qua Host.', note:'Input chỉ gửi lên, Host tính toán di chuyển thật — tránh để client tự quyết định vị trí cuối cùng.', status:'todo', assignee:''},
  {id:'t17', role:'both', week:'Tuần 4', title:'Ghép hệ thống bắn súng vào RPC', desc:'Host xử lý va chạm, client chỉ hiển thị.', note:'Client bắn → gửi ServerRpc → Host spawn đạn + tính va chạm → gửi kết quả về qua ClientRpc/NetworkVariable.', status:'todo', assignee:''},
  {id:'t18', role:'both', week:'Tuần 4', title:'Test: 2 người chơi qua mạng cùng bắn 1 quái chung máu', desc:'Cột mốc quan trọng nhất tháng 1.', note:'Đây là điểm kiểm chứng rủi ro kỹ thuật lớn nhất. Nếu chạy ổn (không desync, không lag nặng), coi như đã vượt phần khó nhất của dự án.', status:'todo', assignee:''},
  {id:'t19', role:'both', week:'Tuần 4', title:'Ghi chú lại vấn đề gặp phải (lag, desync, bug)', desc:'Chuẩn bị input cho kế hoạch tháng 2.', note:'Liệt kê cụ thể: lỗi gì, tái hiện thế nào, đã thử fix ra sao — dùng làm tài liệu tham khảo khi mở rộng crafting tháng 2.', status:'todo', assignee:''},
];

let tasks = [];
let people = { ...defaultPeople };
let activeFilter = 'all';
let editingId = null;

async function getStorage(key){
  try{
    const result = await window.storage.get(key, false);
    if(result && result.value) return JSON.parse(result.value);
  }catch(e){}
  return null;
}
async function setStorage(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); }
  catch(e){ console.warn('Storage lỗi, dữ liệu chỉ giữ tạm trong phiên này.', e); }
}

function tagLabel(role){
  if(role==='gameplay') return '<span class="tag gameplay">GAMEPLAY</span>';
  if(role==='network') return '<span class="tag network">NETWORK</span>';
  return '<span class="tag both">CẢ HAI</span>';
}

function assigneeName(id){
  if(id==='p1') return people.p1;
  if(id==='p2') return people.p2;
  return '';
}

function renderFilters(){
  const wrap = document.getElementById('filters');
  const opts = [
    {key:'all', label:'Tất cả'},
    {key:'gameplay', label:'Gameplay'},
    {key:'network', label:'Network'},
    {key:'both', label:'Cả hai'},
  ];
  wrap.innerHTML = opts.map(o=>`<div class="chip ${activeFilter===o.key?'active':''}" data-filter="${o.key}">${o.label}</div>`).join('');
  wrap.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=>{
      activeFilter = c.dataset.filter;
      render();
    });
  });
}

function render(){
  renderFilters();
  ['todo','doing','done'].forEach(status=>{
    const zone = document.getElementById('zone-'+status);
    zone.innerHTML = '';
    let list = tasks.filter(t=>t.status===status);
    if(activeFilter!=='all') list = list.filter(t=>t.role===activeFilter);
    document.getElementById('count-'+status).textContent = list.length;
    list.forEach(t=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.id = t.id;
      const aName = assigneeName(t.assignee);
      card.innerHTML = `
        <div class="card-top">
          ${tagLabel(t.role)}
          <span class="week">${t.week}</span>
        </div>
        <div class="title">${t.title}</div>
        <div class="desc">${t.desc||''}</div>
        <div class="card-bottom">
          <span class="note-flag">${t.note ? '📝 có ghi chú' : ''}</span>
          ${aName ? `<span class="assignee">${aName}</span>` : ''}
        </div>
      `;
      card.addEventListener('dragstart', e=>{
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', t.id);
      });
      card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
      card.addEventListener('click', e=>{
        if(card.classList.contains('dragging')) return;
        openTaskModal(t.id);
      });
      zone.appendChild(card);
    });
  });

  const total = tasks.length;
  const done = tasks.filter(t=>t.status==='done').length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-label').textContent = `${done} / ${total} task hoàn thành`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('bar-fill').style.width = pct + '%';
}

function setupDropzones(){
  ['todo','doing','done'].forEach(status=>{
    const zone = document.getElementById('zone-'+status);
    zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('over'));
    zone.addEventListener('drop', async e=>{
      e.preventDefault();
      zone.classList.remove('over');
      const id = e.dataTransfer.getData('text/plain');
      const task = tasks.find(t=>t.id===id);
      if(task){
        task.status = status;
        render();
        await setStorage(STORAGE_KEY, tasks);
      }
    });
  });
}

function fillAssigneeOptions(){
  const sel = document.getElementById('f-assignee');
  sel.innerHTML = `
    <option value="">— Chưa gán —</option>
    <option value="p1">${people.p1}</option>
    <option value="p2">${people.p2}</option>
  `;
}

function openTaskModal(id){
  editingId = id;
  fillAssigneeOptions();
  const overlay = document.getElementById('task-overlay');
  const isNew = !id;
  document.getElementById('modal-title').textContent = isNew ? 'Thêm task mới' : 'Chi tiết task';
  document.getElementById('delete-task-btn').style.display = isNew ? 'none' : 'inline-block';

  if(isNew){
    document.getElementById('task-id').value = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-role').value = 'both';
    document.getElementById('f-assignee').value = '';
    document.getElementById('f-week').value = 'Tuần 1';
    document.getElementById('f-status').value = 'todo';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-note').value = '';
  } else {
    const t = tasks.find(x=>x.id===id);
    document.getElementById('task-id').value = t.id;
    document.getElementById('f-title').value = t.title;
    document.getElementById('f-role').value = t.role;
    document.getElementById('f-assignee').value = t.assignee || '';
    document.getElementById('f-week').value = t.week;
    document.getElementById('f-status').value = t.status;
    document.getElementById('f-desc').value = t.desc || '';
    document.getElementById('f-note').value = t.note || '';
  }
  overlay.classList.add('show');
}

function closeTaskModal(){
  document.getElementById('task-overlay').classList.remove('show');
  editingId = null;
}

async function saveTaskFromModal(){
  const title = document.getElementById('f-title').value.trim();
  if(!title){ alert('Vui lòng nhập tiêu đề task.'); return; }
  const id = document.getElementById('task-id').value;
  const data = {
    role: document.getElementById('f-role').value,
    assignee: document.getElementById('f-assignee').value,
    week: document.getElementById('f-week').value,
    status: document.getElementById('f-status').value,
    title,
    desc: document.getElementById('f-desc').value.trim(),
    note: document.getElementById('f-note').value.trim(),
  };
  if(id){
    const t = tasks.find(x=>x.id===id);
    Object.assign(t, data);
  } else {
    const newId = 't' + Date.now();
    tasks.push({ id:newId, ...data });
  }
  await setStorage(STORAGE_KEY, tasks);
  render();
  closeTaskModal();
}

async function deleteTask(){
  const id = document.getElementById('task-id').value;
  if(!id) return;
  if(!confirm('Xóa task này?')) return;
  tasks = tasks.filter(t=>t.id!==id);
  await setStorage(STORAGE_KEY, tasks);
  render();
  closeTaskModal();
}

function openPeopleModal(){
  document.getElementById('person1-input').value = people.p1;
  document.getElementById('person2-input').value = people.p2;
  document.getElementById('people-overlay').classList.add('show');
}
function closePeopleModal(){
  document.getElementById('people-overlay').classList.remove('show');
}
async function savePeople(){
  people.p1 = document.getElementById('person1-input').value.trim() || 'Người 1';
  people.p2 = document.getElementById('person2-input').value.trim() || 'Người 2';
  await setStorage(PEOPLE_KEY, people);
  render();
  closePeopleModal();
}

async function resetBoard(){
  if(!confirm('Reset toàn bộ task về mặc định? Mọi chỉnh sửa sẽ mất.')) return;
  tasks = JSON.parse(JSON.stringify(defaultTasks));
  await setStorage(STORAGE_KEY, tasks);
  render();
}

document.getElementById('add-task-btn').addEventListener('click', ()=> openTaskModal(null));
document.getElementById('close-modal').addEventListener('click', closeTaskModal);
document.getElementById('cancel-modal-btn').addEventListener('click', closeTaskModal);
document.getElementById('save-task-btn').addEventListener('click', saveTaskFromModal);
document.getElementById('delete-task-btn').addEventListener('click', deleteTask);
document.getElementById('task-overlay').addEventListener('click', e=>{ if(e.target.id==='task-overlay') closeTaskModal(); });

document.getElementById('manage-people-btn').addEventListener('click', openPeopleModal);
document.getElementById('close-people-modal').addEventListener('click', closePeopleModal);
document.getElementById('cancel-people-btn').addEventListener('click', closePeopleModal);
document.getElementById('save-people-btn').addEventListener('click', savePeople);
document.getElementById('people-overlay').addEventListener('click', e=>{ if(e.target.id==='people-overlay') closePeopleModal(); });

async function init(){
  const savedTasks = await getStorage(STORAGE_KEY);
  const savedPeople = await getStorage(PEOPLE_KEY);
  tasks = (savedTasks && Array.isArray(savedTasks) && savedTasks.length) ? savedTasks : JSON.parse(JSON.stringify(defaultTasks));
  people = savedPeople || { ...defaultPeople };
  setupDropzones();
  render();
}
init();
</script>
